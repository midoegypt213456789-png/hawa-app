<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HAWA CO - تسجيل الدخول</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #1A1A1A;
    --text: #F0EDE8;
    --text-dim: #8A8580;
    --border: #2A2A2A;
    --error: #E05555;
    --success: #4CAF7D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { height: 100%; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .logo-wrap {
    text-align: center;
    margin-bottom: 20px;
    padding-top: 10px;
  }

  .logo-icon {
    width: 65px; height: 65px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    margin-bottom: 10px;
    box-shadow: 0 8px 32px rgba(201,168,76,0.25);
  }

  .logo-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-top: 4px;
  }

  .tabs {
    display: flex;
    background: var(--dark3);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 9px 6px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Cairo', sans-serif;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
  }

  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 18px;
  }

  .form-group { margin-bottom: 14px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .input-wrap { position: relative; }

  .input-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  input {
    width: 100%;
    background: var(--dark3);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 38px 11px 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: all 0.3s ease;
    direction: rtl;
  }

  input:focus {
    border-color: var(--gold);
    background: #1C1C1C;
    box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
  }

  input::placeholder { color: var(--text-dim); }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-main {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--dark);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  .btn-main:active { transform: scale(0.98); }
  .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

  .btn-secondary {
    width: 100%;
    padding: 11px;
    background: transparent;
    color: var(--gold);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border: 1.5px solid rgba(201,168,76,0.3);
    border-radius: 14px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.3s ease;
  }

  .alert {
    padding: 11px 14px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    display: none;
    align-items: center;
    gap: 8px;
    line-height: 1.5;
  }

  .alert.error { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.3); color: var(--error); display: flex; }
  .alert.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); color: var(--success); display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(10,10,10,0.3);
    border-top-color: var(--dark);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-left: 6px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .divider {
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    margin: 12px 0;
    position: relative;
  }

  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 35%;
    height: 1px;
    background: var(--border);
  }

  .divider::before { right: 0; }
  .divider::after { left: 0; }

  .step-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    text-align: center;
  }

  .step-title span { color: var(--gold); }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    margin: 14px 0 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 5px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">

  <div class="logo-wrap">
    <div class="logo-icon">🚗</div>
    <div class="logo-title">HAWA CO</div>
    <div class="logo-sub">نظام حجز دور العربيات</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">🔑 تسجيل دخول</button>
    <button class="tab" onclick="switchTab('register')">📝 عميل جديد</button>
  </div>

  <div class="card">
    <div class="alert" id="alert"></div>

    <!-- LOGIN -->
    <div class="section active" id="login-section">
      <p class="step-title">أهلاً بك في <span>HAWA CO</span></p>

      <div class="form-group">
        <label>اسم المستخدم</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="login-username" placeholder="أدخل اسم المستخدم" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>

      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="login-password" placeholder="أدخل كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>

      <button class="btn-main" onclick="doLogin()" id="login-btn">تسجيل الدخول</button>
      <div class="divider">أو</div>
      <button class="btn-secondary" onclick="switchTab('forgot')">🔓 نسيت كلمة المرور؟</button>
    </div>

    <!-- REGISTER -->
    <div class="section" id="register-section">
      <p class="step-title">إنشاء <span>حساب جديد</span></p>

      <div class="section-label">📋 بيانات الشركة</div>

      <div class="form-group">
        <label>كود العميل في الشركة</label>
        <div class="input-wrap">
          <span class="input-icon">🏷️</span>
          <input type="text" id="reg-code" placeholder="مثال: C001 أو 1234AB">
        </div>
      </div>

      <div class="section-label">👤 البيانات الشخصية</div>

      <div class="form-group">
        <label>الاسم الثلاثي</label>
        <div class="input-wrap">
          <span class="input-icon">📛</span>
          <input type="text" id="reg-name" placeholder="الاسم الأول والثاني والثالث">
        </div>
      </div>

      <div class="form-group">
        <label>رقم الهاتف</label>
        <div class="input-wrap">
          <span class="input-icon">📱</span>
          <input type="tel" id="reg-phone" placeholder="01xxxxxxxxx">
        </div>
      </div>

      <div class="section-label">📍 العنوان</div>

      <div class="form-group">
        <label>المحافظة</label>
        <select id="reg-gov" onchange="onGovChange()">
          <option value="">-- اختر المحافظة --</option>
        </select>
      </div>

      <div class="form-group">
        <label>المدينة / المركز / الحي</label>
        <select id="reg-city" disabled>
          <option value="">-- اختر المحافظة أولاً --</option>
        </select>
      </div>

      <div class="form-group">
        <label>المركز</label>
        <select id="reg-district" disabled>
          <option value="">-- اختر المحافظة أولاً --</option>
        </select>
      </div>

      <div class="form-group">
        <label>العنوان التفصيلي</label>
        <div class="input-wrap">
          <span class="input-icon">📍</span>
          <input type="text" id="reg-address" placeholder="الشارع، المبنى، الشقة...">
        </div>
      </div>

      <div class="section-label">🔐 بيانات الدخول</div>

      <div class="form-group">
        <label>اسم المستخدم</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="reg-username" placeholder="اختر اسم مستخدم">
        </div>
      </div>

      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="reg-password" placeholder="كلمة مرور قوية">
        </div>
      </div>

      <button class="btn-main" onclick="doRegister()" id="register-btn">إنشاء الحساب</button>
      <button class="btn-secondary" onclick="switchTab('login')">← العودة لتسجيل الدخول</button>
    </div>

    <!-- FORGOT -->
    <div class="section" id="forgot-section">
      <p class="step-title">🔓 استعادة <span>كلمة المرور</span></p>

      <div class="form-group">
        <label>كود العميل في الشركة</label>
        <div class="input-wrap">
          <span class="input-icon">🏷️</span>
          <input type="text" id="forgot-code" placeholder="أدخل كود العميل">
        </div>
      </div>

      <div class="form-group">
        <label>رقم الهاتف المسجل</label>
        <div class="input-wrap">
          <span class="input-icon">📱</span>
          <input type="tel" id="forgot-phone" placeholder="01xxxxxxxxx">
        </div>
      </div>

      <div class="form-group" id="new-pass-group" style="display:none">
        <label>كلمة المرور الجديدة</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="forgot-newpass" placeholder="أدخل كلمة المرور الجديدة">
        </div>
      </div>

      <button class="btn-main" onclick="doForgot()" id="forgot-btn">التحقق من البيانات</button>
      <button class="btn-secondary" onclick="switchTab('login')">← العودة لتسجيل الدخول</button>
    </div>

  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }
  const telegramId = tg?.initDataUnsafe?.user?.id || 'test_user';

  const SUPABASE_URL = 'https://oqsowwtjutpjdypjpcum.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_rCmWQJCKfoJK4XiY2JKUzQ_CI9IGtP5';

  let forgotVerified = false;
  let forgotUserId = null;

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    hideAlert();
    if (tab === 'login') {
      document.querySelectorAll('.tab')[0].classList.add('active');
      document.getElementById('login-section').classList.add('active');
    } else if (tab === 'register') {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('register-section').classList.add('active');
    } else if (tab === 'forgot') {
      document.getElementById('forgot-section').classList.add('active');
    }
  }

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
    el.className = 'alert ' + type;
  }

  function hideAlert() {
    document.getElementById('alert').className = 'alert';
  }

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const password = document.getElementById('login-password').value.trim();

    if (!username || !password) {
      showAlert('من فضلك أدخل اسم المستخدم وكلمة المرور', 'error');
      return;
    }

    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = 'جاري التحقق... <span class="spinner"></span>';

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/clients?username=eq.${encodeURIComponent(username)}&password=eq.${encodeURIComponent(password)}&select=*`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const data = await res.json();

      if (data && data.length > 0) {
        const user = data[0];
        showAlert(`أهلاً ${user.name}! تم تسجيل الدخول بنجاح 🎉`, 'success');
        localStorage.setItem('hawa_user', JSON.stringify(user));
        setTimeout(() => { window.location.href = 'hawa_booking.html'; }, 2000);
      } else {
        showAlert('اسم المستخدم أو كلمة المرور غير صحيحة', 'error');
      }
    } catch (e) {
      showAlert('حدث خطأ في الاتصال، حاول مرة أخرى', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = 'تسجيل الدخول';
  }

  async function doRegister() {
    const data = {
      company_code: document.getElementById('reg-code').value.trim(),
      name: document.getElementById('reg-name').value.trim(),
      phone: document.getElementById('reg-phone').value.trim(),
      governorate: document.getElementById('reg-gov').value,
      city: document.getElementById('reg-city').value,
      district: document.getElementById('reg-district').value,
      address: document.getElementById('reg-address').value.trim(),
      username: document.getElementById('reg-username').value.trim(),
      password: document.getElementById('reg-password').value.trim(),
    };

    if (Object.values(data).some(v => !v)) {
      showAlert('من فضلك أكمل جميع الحقول', 'error');
      return;
    }

    if (data.name.trim().split(/\s+/).length < 3) {
      showAlert('من فضلك أدخل الاسم الثلاثي كاملاً', 'error');
      return;
    }

    if (!/^01[0-9]{9}$/.test(data.phone)) {
      showAlert('رقم الهاتف غير صحيح — لازم يبدأ بـ 01 ويكون 11 رقم بالظبط', 'error');
      return;
    }

    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.innerHTML = 'جاري التسجيل... <span class="spinner"></span>';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/clients`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        showAlert('تم إنشاء الحساب بنجاح! 🎉 يمكنك تسجيل الدخول الآن', 'success');
        setTimeout(() => switchTab('login'), 2500);
      } else {
        const err = await res.json();
        if (err.code === '23505') {
          showAlert('اسم المستخدم أو كود العميل مسجل بالفعل', 'error');
        } else {
          showAlert('حدث خطأ في التسجيل، حاول مرة أخرى', 'error');
        }
      }
    } catch (e) {
      showAlert('حدث خطأ في الاتصال', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = 'إنشاء الحساب';
  }

// ===== Governorate Cascade =====
function initGovDropdown() {
  const govSel = document.getElementById('reg-gov');
  if (!govSel) return;
  Object.keys(EGYPT).sort().forEach(gov => {
    const opt = document.createElement('option');
    opt.value = gov; opt.textContent = gov;
    govSel.appendChild(opt);
  });
}

function onGovChange() {
  const gov = document.getElementById('reg-gov').value;
  const citySel = document.getElementById('reg-city');
  const distSel = document.getElementById('reg-district');

  citySel.innerHTML = '<option value="">-- اختر المدينة/المركز --</option>';
  distSel.innerHTML = '<option value="">-- اختر المدينة أولاً --</option>';

  if (!gov) {
    citySel.disabled = true; distSel.disabled = true; return;
  }

  const districts = EGYPT[gov] || [];
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    citySel.appendChild(opt);
  });
  citySel.disabled = false;
  distSel.disabled = false;

  // sync city → district
  citySel.onchange = () => {
    const city = citySel.value;
    distSel.innerHTML = '<option value="">-- اختر --</option>';
    if (city) {
      const opt = document.createElement('option');
      opt.value = city; opt.textContent = city;
      distSel.appendChild(opt);
      distSel.value = city;
    }
  };
}

// Init on load
initGovDropdown();

  async function doForgot() {
    if (!forgotVerified) {
      const code = document.getElementById('forgot-code').value.trim();
      const phone = document.getElementById('forgot-phone').value.trim();

      if (!code || !phone) {
        showAlert('من فضلك أدخل كود العميل ورقم الهاتف', 'error');
        return;
      }

      const btn = document.getElementById('forgot-btn');
      btn.disabled = true;
      btn.innerHTML = 'جاري التحقق... <span class="spinner"></span>';

      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/clients?company_code=eq.${encodeURIComponent(code)}&phone=eq.${encodeURIComponent(phone)}&select=id,name`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const data = await res.json();

        if (data && data.length > 0) {
          forgotVerified = true;
          forgotUserId = data[0].id;
          showAlert(`تم التحقق! أهلاً ${data[0].name} - أدخل كلمة المرور الجديدة`, 'success');
          document.getElementById('new-pass-group').style.display = 'block';
          btn.innerHTML = 'حفظ كلمة المرور الجديدة';
        } else {
          showAlert('الكود أو رقم الهاتف غير صحيح', 'error');
          btn.innerHTML = 'التحقق من البيانات';
        }
      } catch (e) {
        showAlert('حدث خطأ في الاتصال', 'error');
        btn.innerHTML = 'التحقق من البيانات';
      }
      btn.disabled = false;

    } else {
      const newpass = document.getElementById('forgot-newpass').value.trim();
      if (!newpass || newpass.length < 4) {
        showAlert('كلمة المرور لازم تكون 4 أحرف على الأقل', 'error');
        return;
      }

      const btn = document.getElementById('forgot-btn');
      btn.disabled = true;
      btn.innerHTML = 'جاري الحفظ... <span class="spinner"></span>';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/clients?id=eq.${forgotUserId}`, {
          method: 'PATCH',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password: newpass })
        });

        if (res.ok) {
          showAlert('تم تغيير كلمة المرور بنجاح! 🎉', 'success');
          forgotVerified = false;
          forgotUserId = null;
          setTimeout(() => switchTab('login'), 2000);
        } else {
          showAlert('حدث خطأ، حاول مرة أخرى', 'error');
        }
      } catch (e) {
        showAlert('حدث خطأ في الاتصال', 'error');
      }
      btn.disabled = false;
      btn.innerHTML = 'حفظ كلمة المرور الجديدة';
    }
  }
