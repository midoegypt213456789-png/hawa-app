<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير - HAWA CO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f0f0f0;
    color: #111;
    padding: 16px;
    direction: rtl;
  }

  @media print {
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .report-section { page-break-after: always; }
    .report-section:last-child { page-break-after: avoid; }
  }

  .header {
    background: #1a1a1a; color: #E8C97A;
    padding: 14px 20px; border-radius: 14px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
  }
  .logo { font-size: 18px; font-weight: 900; letter-spacing: 2px; }
  .header-btns { display: flex; gap: 8px; }
  .btn {
    padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
  }
  .btn-gold { background: linear-gradient(135deg, #C9A84C, #E8C97A); color: #111; }
  .btn-dark { background: transparent; border: 1.5px solid #444; color: #aaa; }

  .filters {
    background: white; border-radius: 14px; padding: 16px 20px;
    margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 12px; font-weight: 700; color: #888; }
  .filter-group input, .filter-group select {
    padding: 8px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px;
    font-family: 'Cairo', sans-serif; font-size: 13px; color: #111;
    background: #fafafa; outline: none;
  }
  .filter-group input:focus, .filter-group select:focus { border-color: #C9A84C; }
  .btn-filter {
    padding: 9px 20px; border-radius: 10px; border: none; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 700;
    background: linear-gradient(135deg, #C9A84C, #E8C97A); color: #111;
    align-self: flex-end;
  }

  .summary-cards { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .sum-card {
    background: white; border-radius: 12px; padding: 14px 20px;
    flex: 1; min-width: 100px; text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .sum-card .sv { font-size: 26px; font-weight: 900; color: #C9A84C; }
  .sum-card .sl { font-size: 12px; color: #999; margin-top: 2px; }

  .report-section {
    background: white; border-radius: 12px; overflow: hidden;
    margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .wh-header {
    background: #111; color: #E8C97A; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .wh-title { font-size: 20px; font-weight: 900; }
  .wh-meta { font-size: 12px; color: #aaa; text-align: left; line-height: 1.8; }
  .wh-meta b { color: #E8C97A; font-size: 14px; }

  .vtype-section { border-bottom: 3px solid #f0f0f0; }
  .vtype-section:last-child { border-bottom: none; }
  .vtype-header {
    background: #f8f5ee; padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #e8e0d0;
  }
  .vtype-title { font-size: 15px; font-weight: 900; color: #333; }
  .vtype-count {
    background: #C9A84C; color: white;
    font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px;
  }

  .slot-group { padding: 0 24px 10px; }
  .slot-label {
    font-size: 11px; font-weight: 700; color: #888;
    padding: 8px 0 5px; border-bottom: 1px dashed #e0e0e0; margin-bottom: 5px;
  }

  table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
  th {
    font-size: 11px; font-weight: 700; color: #999;
    text-align: right; padding: 6px 8px; border-bottom: 1px solid #eee;
  }
  td { font-size: 13px; padding: 8px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fdfaf5; }

  .td-num { color: #999; font-size: 12px; width: 30px; }
  .td-name { font-weight: 700; color: #111; }
  .td-code { color: #C9A84C; font-weight: 600; font-size: 12px; }
  .td-count { font-weight: 900; font-size: 15px; color: #111; text-align: center; width: 60px; }
  .td-count span { font-size: 11px; font-weight: 400; color: #999; }

  .status-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .status-pending { background: #E8F0FD; color: #4A90D9; }
  .status-done    { background: #E6F9F0; color: #4CAF7D; }
  .status-noshow  { background: #FDE8E8; color: #E05555; }

  .wh-footer {
    background: #fafafa; border-top: 2px solid #eee;
    padding: 12px 24px; display: flex; gap: 20px; flex-wrap: wrap;
  }
  .wh-stat { display: flex; flex-direction: column; align-items: center; }
  .wh-stat .sv { font-size: 20px; font-weight: 900; color: #C9A84C; }
  .wh-stat .sl { font-size: 11px; color: #999; margin-top: 2px; }

  .signature-area {
    display: flex; justify-content: space-between;
    padding: 16px 24px; border-top: 1px dashed #ddd;
  }
  .sig-box { text-align: center; width: 160px; }
  .sig-line { border-bottom: 1px solid #333; height: 36px; margin-bottom: 6px; }
  .sig-label { font-size: 11px; color: #666; font-weight: 600; }

  .empty-section { padding: 30px; text-align: center; color: #bbb; font-size: 14px; }
  .loading-wrap { text-align: center; padding: 60px; color: #888; font-size: 16px; }
  .btn-done {
    background: #4CAF7D; color: white; border: none; border-radius: 8px;
    padding: 5px 12px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700;
  }
</style>
</head>
<body>

<div class="header no-print">
  <div>
    <div class="logo">🚛 HAWA CO</div>
    <div id="empName" style="font-size:13px;color:#aaa;margin-top:2px"></div>
  </div>
  <div class="header-btns">
    <button class="btn btn-dark" onclick="window.print()">🖨️ طباعة</button>
    <button class="btn btn-dark" onclick="logout()">🚪 خروج</button>
  </div>
</div>

<div class="filters no-print">
  <div class="filter-group">
    <label>📅 من تاريخ</label>
    <input type="date" id="dateFrom" onchange="loadReport()">
  </div>
  <div class="filter-group">
    <label>📅 إلى تاريخ</label>
    <input type="date" id="dateTo" onchange="loadReport()">
  </div>
  <div class="filter-group">
    <label>🏭 المخزن</label>
    <select id="filterWarehouse" onchange="loadReport()">
      <option value="">كل المخازن</option>
      <option value="قليوب">قليوب</option>
      <option value="السادات">السادات</option>
    </select>
  </div>
  <div class="filter-group">
    <label>🚗 نوع العربية</label>
    <select id="filterVtype" onchange="loadReport()">
      <option value="">كل الأنواع</option>
      <option value="موتسيكل">موتسيكل</option>
      <option value="تروسكل">تروسكل</option>
      <option value="كهرباء">كهرباء</option>
    </select>
  </div>
  <div class="filter-group">
    <label>📋 الحالة</label>
    <select id="filterStatus" onchange="loadReport()">
      <option value="">كل الحالات</option>
      <option value="قيد الانتظار">قيد الانتظار</option>
      <option value="تم التنفيذ">تم التنفيذ</option>
      <option value="ملغي">ملغي</option>
    </select>
  </div>
</div>

<div class="summary-cards no-print" id="summaryCards" style="display:none"></div>
<div id="reportContainer"><div class="loading-wrap">🔍 اختر الفلاتر واضغط "عرض التقرير"</div></div>

<script>
const SB  = 'https://oqsowwtjutpjdypjpcum.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xc293d3RqdXRwamR5cGpwY3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzI5ODAsImV4cCI6MjA5MTAwODk4MH0.Dp-WXuV-fHBsv35xiO7LnkTDevxKE5CC2iEVGNmwnqQ';
const HDR = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` };
const N8N = 'https://unhatched-lashaunda-inductive.ngrok-free.dev/webhook/booking-confirm';
const VTYPES = ['موتسيكل', 'تروسكل', 'كهرباء'];
const VICONS = { 'موتسيكل': '🏍️', 'تروسكل': '🛺', 'كهرباء': '⚡' };
const SLOTS  = ['8:00 - 9:00','9:00 - 10:00','10:00 - 11:00','11:00 - 12:00',
                '12:00 - 1:00','1:00 - 2:00','2:00 - 3:00','3:00 - 4:00'];

// ===== AUTH CHECK =====
const emp = JSON.parse(localStorage.getItem('hawa_employee') || 'null');
if (!emp) { window.location.href = 'hawa_employee.html'; }

const empRole = emp ? (emp.role || emp.warehouse || 'عام') : 'عام';
document.getElementById('empName').textContent = '👤 ' + (emp ? emp.name : '') + ' — ' + empRole;

// قيّد المخزن حسب الصلاحية
const whFilter = document.getElementById('filterWarehouse');
if (empRole === 'قليوب') {
  whFilter.value = 'قليوب';
  whFilter.disabled = true;
  whFilter.closest('.filter-group').style.display = 'none';
} else if (empRole === 'السادات') {
  whFilter.value = 'السادات';
  whFilter.disabled = true;
  whFilter.closest('.filter-group').style.display = 'none';
}

function logout() {
  localStorage.removeItem('hawa_employee');
  window.location.href = 'hawa_employee.html';
}

const today = new Date().toISOString().split('T')[0];
const urlDate = new URLSearchParams(location.search).get('date');
document.getElementById('dateFrom').value = urlDate || today;
document.getElementById('dateTo').value   = urlDate || today;

// تحميل تلقائي
loadReport();

async function loadReport() {
  const dateFrom  = document.getElementById('dateFrom').value;
  const dateTo    = document.getElementById('dateTo').value;
  const warehouse = document.getElementById('filterWarehouse').value;
  const vtype     = document.getElementById('filterVtype').value;
  const status    = document.getElementById('filterStatus').value;

  if (!dateFrom || !dateTo) { alert('اختر تاريخ البداية والنهاية'); return; }

  document.getElementById('reportContainer').innerHTML = '<div class="loading-wrap">⏳ جاري تحميل التقرير...</div>';
  document.getElementById('summaryCards').style.display = 'none';

  try {
    let query = `${SB}/rest/v1/bookings?select=*&loading_date=gte.${dateFrom}&loading_date=lte.${dateTo}&order=loading_date.asc,time_slot.asc`;
    if (warehouse) query += `&warehouse=eq.${encodeURIComponent(warehouse)}`;
    if (vtype)     query += `&vehicle_type=eq.${encodeURIComponent(vtype)}`;
    if (status)    query += `&status=eq.${encodeURIComponent(status)}`;
    else           query += `&status=neq.${encodeURIComponent('ملغي')}`;

    const r = await fetch(query, { headers: HDR });
    const bookings = await r.json();
    if (!Array.isArray(bookings)) throw new Error('خطأ');

    const ids = [...new Set(bookings.map(b => b.client_id).filter(Boolean))];
    let clientMap = {};
    if (ids.length) {
      const cr = await fetch(`${SB}/rest/v1/clients?id=in.(${ids.join(',')})&select=id,name,company_code`, { headers: HDR });
      (await cr.json()).forEach(c => clientMap[c.id] = c);
    }

    const totalBks  = bookings.length;
    const totalCars = bookings.reduce((s,b) => s+(b.count||0), 0);
    const done      = bookings.filter(b => b.status === 'تم التنفيذ').length;
    const pending   = bookings.filter(b => b.status === 'قيد الانتظار').length;
    const noshow    = bookings.filter(b => b.status === 'no-show').length;

    document.getElementById('summaryCards').style.display = 'flex';
    document.getElementById('summaryCards').innerHTML = `
      <div class="sum-card"><div class="sv">${totalBks}</div><div class="sl">إجمالي الحجوزات</div></div>
      <div class="sum-card"><div class="sv">${totalCars}</div><div class="sl">إجمالي العربيات</div></div>
      <div class="sum-card"><div class="sv" style="color:#4A90D9">${pending}</div><div class="sl">منتظر</div></div>
      <div class="sum-card"><div class="sv" style="color:#4CAF7D">${done}</div><div class="sl">تم التحميل</div></div>
      <div class="sum-card"><div class="sv" style="color:#E05555">${noshow}</div><div class="sl">غائب</div></div>
    `;

    if (!totalBks) {
      document.getElementById('reportContainer').innerHTML = '<div class="loading-wrap">📭 لا توجد حجوزات بهذه الفلاتر</div>';
      return;
    }

    const warehouses = [...new Set(bookings.map(b => b.warehouse))];
    const dates      = [...new Set(bookings.map(b => b.loading_date))].sort();
    let html = '';

    warehouses.forEach(wh => {
      dates.forEach(date => {
        const bks = bookings.filter(b => b.warehouse === wh && b.loading_date === date);
        if (!bks.length) return;
        const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString('ar-EG', {
          weekday:'long', day:'numeric', month:'long', year:'numeric'
        });
        html += buildSection(wh, date, dateLabel, bks, clientMap, vtype);
      });
    });

    document.getElementById('reportContainer').innerHTML = html;
  } catch(e) {
    console.error(e);
    document.getElementById('reportContainer').innerHTML = '<div class="loading-wrap">❌ خطأ في تحميل التقرير</div>';
  }
}

function buildSection(wh, date, dateLabel, bookings, clientMap, vtypeFilter) {
  const totalCars = bookings.reduce((s,b) => s+(b.count||0), 0);
  const done    = bookings.filter(b => b.status === 'تم التنفيذ').length;
  const pending = bookings.filter(b => b.status === 'قيد الانتظار').length;
  const noshow  = bookings.filter(b => b.status === 'no-show').length;

  const vtypesToShow = vtypeFilter ? [vtypeFilter] : VTYPES;
  let vtypesHtml = '';
  vtypesToShow.forEach(vt => {
    const bks = bookings.filter(b => b.vehicle_type === vt);
    if (!bks.length) return;
    vtypesHtml += buildVtypeSection(vt, bks, clientMap, wh, date);
  });
  if (!vtypesHtml) vtypesHtml = '<div class="empty-section">لا توجد حجوزات</div>';

  return `<div class="report-section">
    <div class="wh-header">
      <div>
        <div class="wh-title">🏭 مخزن ${wh}</div>
        <div style="font-size:12px;color:#aaa;margin-top:3px">${dateLabel}</div>
      </div>
      <div class="wh-meta">الحجوزات: <b>${bookings.length}</b><br>العربيات: <b>${totalCars}</b></div>
    </div>
    ${vtypesHtml}
    <div class="wh-footer">
      <div class="wh-stat"><div class="sv">${bookings.length}</div><div class="sl">حجز</div></div>
      <div class="wh-stat"><div class="sv">${totalCars}</div><div class="sl">عربية</div></div>
      <div class="wh-stat"><div class="sv" style="color:#4A90D9">${pending}</div><div class="sl">منتظر</div></div>
      <div class="wh-stat"><div class="sv" style="color:#4CAF7D">${done}</div><div class="sl">حضر</div></div>
      <div class="wh-stat"><div class="sv" style="color:#E05555">${noshow}</div><div class="sl">غائب</div></div>
    </div>
    <div class="signature-area no-print">
      <div class="sig-box"><div class="sig-line"></div><div class="sig-label">توقيع مدير المخزن</div></div>
      <div class="sig-box"><div class="sig-line"></div><div class="sig-label">توقيع الأمن</div></div>
      <div class="sig-box"><div class="sig-line"></div><div class="sig-label">توقيع المشرف</div></div>
    </div>
  </div>`;
}

function buildVtypeSection(vtype, bookings, clientMap, wh, date) {
  const totalCars = bookings.reduce((s,b) => s+(b.count||0), 0);
  let slotsHtml = '', rowCounter = 1;

  SLOTS.forEach(slot => {
    const slotBks = bookings.filter(b => b.time_slot === slot);
    if (!slotBks.length) return;
    let rows = '';
    slotBks.forEach(b => {
      const c = clientMap[b.client_id] || {};
      const sc = b.status === 'تم التنفيذ' ? 'status-done' : b.status === 'no-show' ? 'status-noshow' : 'status-pending';
      const sl = b.status === 'تم التنفيذ' ? '✅ تم' : b.status === 'no-show' ? '❌ غائب' : '⏳ منتظر';
      rows += `<tr id="row-${b.id}">
        <td class="td-num">${rowCounter++}</td>
        <td class="td-name">${c.name||'-'}</td>
        <td class="td-code">${c.company_code||'-'}</td>
        <td style="font-size:12px;color:#555">${slot}</td>
        <td class="td-count">${b.count}<br><span>عربية</span></td>
        <td><span class="status-badge ${sc}">${sl}</span></td>
        <td class="no-print">${b.status==='قيد الانتظار'?`<button class="btn-done" onclick="markDone(${b.id},'${wh}','${(c.name||'').replace(/'/g,"\\'")}','${c.company_code||''}',${b.count},'${vtype}','${slot}','${date}')">✅ تم التحميل</button>`:''}
        </td>
      </tr>`;
    });
    slotsHtml += `<div class="slot-group">
      <div class="slot-label">⏰ ${slot} — ${slotBks.length} حجز | ${slotBks.reduce((s,b)=>s+(b.count||0),0)} عربية</div>
      <table><thead><tr><th>#</th><th>اسم العميل</th><th>الكود</th><th>الموعد</th><th>العدد</th><th>الحالة</th><th class="no-print">إجراء</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  });

  return `<div class="vtype-section">
    <div class="vtype-header">
      <div class="vtype-title">${VICONS[vtype]} ${vtype}</div>
      <span class="vtype-count">${bookings.length} حجز | ${totalCars} عربية</span>
    </div>${slotsHtml}</div>`;
}

async function markDone(id, wh, name, code, count, vtype, slot, date) {
  if (!confirm(`تأكيد تحميل:\n${name} | ${code}\n${vtype} - ${count} عربية`)) return;
  try {
    await fetch(`${SB}/rest/v1/bookings?id=eq.${id}`, {
      method: 'PATCH',
      headers: { ...HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ status: 'تم التنفيذ' })
    });
    const row = document.getElementById('row-' + id);
    if (row) { row.style.transition='opacity 0.4s'; row.style.opacity='0'; setTimeout(()=>row.remove(),400); }
    fetch(N8N, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'done', warehouse:wh, client_name:name, company_code:code, vehicle_type:vtype, count:count, time_slot:slot, date:date })
    }).catch(()=>{});
  } catch(e) { alert('حدث خطأ، حاول تاني'); }
}
</script>
</body>
</html>
