<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HAWA CO - موظف</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
  :root {
    --gold:#C9A84C;--gold-light:#E8C97A;--dark:#0A0A0A;--dark2:#111111;--dark3:#1A1A1A;
    --text:#F0EDE8;--text-dim:#8A8580;--border:#2A2A2A;--error:#E05555;--success:#4CAF7D;--blue:#4A90D9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;padding:16px 16px 50px;}
  .container{width:100%;max-width:480px;margin:0 auto;}
  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{width:100%;max-width:380px;}
  .login-logo{text-align:center;margin-bottom:28px;}
  .login-logo .icon{width:70px;height:70px;border-radius:20px;margin:0 auto 12px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 32px rgba(201,168,76,0.3);}
  .login-logo .title{font-size:22px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .login-logo .sub{font-size:12px;color:var(--text-dim);margin-top:4px;letter-spacing:1px;}
  .login-card{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:24px;}
  .login-card h3{font-size:15px;font-weight:700;margin-bottom:18px;text-align:center;}
  .login-card h3 span{color:var(--gold);}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px;}
  .inp-wrap{position:relative;}
  .inp-wrap .ic{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
  input{width:100%;background:var(--dark3);border:1.5px solid var(--border);border-radius:12px;padding:11px 38px 11px 12px;font-family:'Cairo',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all 0.3s;direction:rtl;}
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
  input::placeholder{color:var(--text-dim);}
  .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--dark);font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:14px;cursor:pointer;margin-top:6px;box-shadow:0 4px 20px rgba(201,168,76,0.3);}
  .btn-login:disabled{opacity:0.6;cursor:not-allowed;}
  .alert{padding:11px 14px;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:14px;display:none;align-items:center;gap:8px;}
  .alert.err{display:flex;background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.3);color:var(--error);}
  /* MAIN */
  .main-view{display:none;}
  .main-view.show{display:block;}
  .login-view.hide{display:none;}
  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--dark2);border-radius:16px;border:1px solid var(--border);margin-bottom:14px;}
  .logo{font-size:16px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .emp-name{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .header-right{display:flex;align-items:center;gap:8px;}
  .role-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(74,144,217,0.15);color:var(--blue);}
  .logout-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:'Cairo',sans-serif;}
  .wh-tabs{display:grid;gap:8px;margin-bottom:14px;}
  .wh-tabs.three{grid-template-columns:1fr 1fr 1fr;}
  .wh-tabs.two{grid-template-columns:1fr 1fr;}
  .wh-tabs.one{grid-template-columns:1fr;}
  .wh-btn{padding:12px;border-radius:14px;border:2px solid var(--border);background:var(--dark2);color:var(--text-dim);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;transition:all 0.25s;}
  .wh-btn.active{border-color:var(--gold);background:rgba(201,168,76,0.1);color:var(--gold);}
  .date-bar{text-align:center;padding:10px;background:var(--dark2);border-radius:12px;border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:14px;}
  .date-bar span{color:var(--gold);}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat-card{background:var(--dark2);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;}
  .stat-num{font-size:24px;font-weight:900;}
  .stat-lbl{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .stat-num.pending{color:var(--blue);}
  .stat-num.done{color:var(--success);}
  .stat-num.noshow{color:var(--error);}
  .slot-group{margin-bottom:16px;}
  .slot-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--dark3);border-radius:10px;margin-bottom:8px;font-size:13px;font-weight:700;color:var(--gold);}
  .slot-count{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:rgba(201,168,76,0.15);color:var(--gold);margin-right:auto;}
  .bk-card{background:var(--dark2);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all 0.25s;}
  .bk-card.done{border-color:rgba(76,175,125,0.4);background:rgba(76,175,125,0.05);}
  .bk-card.noshow{border-color:rgba(224,85,85,0.4);background:rgba(224,85,85,0.05);opacity:0.7;}
  .bk-info{flex:1;}
  .bk-name{font-size:14px;font-weight:700;margin-bottom:3px;}
  .bk-meta{font-size:12px;color:var(--text-dim);}
  .bk-meta span{color:var(--gold);font-weight:600;}
  .bk-sub{font-size:12px;color:var(--text);margin-top:2px;}
  .bk-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
  .bk-status.pending{background:rgba(74,144,217,0.15);color:var(--blue);}
  .bk-status.done{background:rgba(76,175,125,0.15);color:var(--success);}
  .bk-status.noshow{background:rgba(224,85,85,0.15);color:var(--error);}
  .check-btn{width:46px;height:46px;border-radius:50%;border:2px solid var(--border);background:var(--dark3);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
  .check-btn:hover:not(:disabled){border-color:var(--success);background:rgba(76,175,125,0.1);}
  .check-btn.checked{border-color:var(--success);background:rgba(76,175,125,0.15);cursor:default;}
  .check-btn.noshowed{border-color:var(--error);background:rgba(224,85,85,0.1);cursor:default;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);}
  .empty-state .ei{font-size:48px;margin-bottom:12px;}
  .loading-state{text-align:center;padding:40px;color:var(--text-dim);font-size:14px;}
  .noshow-all-btn{width:100%;padding:12px;border-radius:14px;margin-top:4px;border:1.5px solid rgba(224,85,85,0.4);background:transparent;color:var(--error);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .noshow-all-btn:hover{background:rgba(224,85,85,0.08);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .dialog{background:var(--dark2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:340px;text-align:center;}
  .d-icon{font-size:44px;margin-bottom:12px;}
  .d-title{font-size:16px;font-weight:700;margin-bottom:8px;}
  .d-msg{font-size:13px;color:var(--text-dim);margin-bottom:20px;line-height:1.6;}
  .d-btns{display:flex;gap:10px;}
  .d-yes{flex:1;padding:12px;border-radius:12px;border:none;background:var(--success);color:white;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
  .d-yes.danger{background:var(--error);}
  .d-no{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
  .spin{width:16px;height:16px;border:2px solid rgba(10,10,10,0.3);border-top-color:#000;border-radius:50%;animation:sp 0.7s linear infinite;display:inline-block;vertical-align:middle;margin-left:6px;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="login-view" id="loginView">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="icon">🚛</div>
        <div class="title">HAWA CO</div>
        <div class="sub">بوابة الموظفين</div>
      </div>
      <div class="login-card">
        <h3>تسجيل دخول <span>الموظف</span></h3>
        <div class="alert" id="loginAlert"></div>
        <div class="form-group">
          <label>اسم المستخدم</label>
          <div class="inp-wrap">
            <span class="ic">👤</span>
            <input type="text" id="empUser" placeholder="اسم المستخدم" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <div class="inp-wrap">
            <span class="ic">🔒</span>
            <input type="password" id="empPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        </div>
        <button class="btn-login" id="loginBtn" onclick="doLogin()">دخول</button>
      </div>
    </div>
  </div>
</div>

<div class="main-view" id="mainView">
  <div class="container">
    <div class="header">
      <div>
        <div class="logo">🚛 HAWA CO</div>
        <div class="emp-name" id="empNameDisplay"></div>
        <div id="refreshIndicator" style="font-size:11px;color:var(--text-dim);margin-top:4px"></div>
      </div>
      <div class="header-right">
        <span class="role-badge" id="roleBadge"></span>
        <button class="logout-btn" onclick="goReport()" style="background:#C9A84C;color:#111;border-color:#C9A84C;margin-left:6px">📊 التقرير</button>
        <button class="logout-btn" onclick="doLogout()">خروج</button>
      </div>
    </div>
    <div class="wh-tabs" id="whTabs"></div>
    <div class="date-bar" style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;padding:10px">
      <span style="font-size:18px">📅</span>
      <input type="date" id="datePickerFrom" onchange="changeDate()" style="background:#1A1A1A;color:#F0EDE8;border:1px solid var(--gold);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:13px;cursor:pointer;color-scheme:dark" title="من تاريخ">
      <span style="color:var(--gold);font-weight:700;font-size:14px">←</span>
      <input type="date" id="datePickerTo" onchange="changeDate()" style="background:#1A1A1A;color:#F0EDE8;border:1px solid var(--gold);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:13px;cursor:pointer;color-scheme:dark" title="إلى تاريخ">
      <button onclick="resetToToday()" id="todayBtn" style="background:rgba(201,168,76,0.15);color:#E0B040;border:1px solid rgba(201,168,76,0.4);border-radius:6px;padding:4px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:none">🔄 اليوم</button>
      <div id="dateLabel" style="color:var(--gold);font-weight:700;width:100%;text-align:center;margin-top:4px"></div>
    </div>

    <div class="filter-bar" style="display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 10px 10px">
      <select id="filterVehicle" onchange="applyFilters()" style="background:#1A1A1A;color:#F0EDE8;border:1px solid rgba(201,168,76,0.4);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:13px;cursor:pointer;color-scheme:dark;min-width:140px">
        <option value="">🚛 كل الأنواع</option>
        <option value="موتسيكل">🏍️ موتسيكل</option>
        <option value="تروسكل">🛺 تروسكل</option>
        <option value="كهرباء">⚡ كهرباء</option>
        <option value="ZONTOS">🚗 ZONTOS</option>
      </select>
      <select id="filterSlot" onchange="applyFilters()" style="background:#1A1A1A;color:#F0EDE8;border:1px solid rgba(201,168,76,0.4);border-radius:8px;padding:7px 12px;font-family:inherit;font-size:13px;cursor:pointer;color-scheme:dark;min-width:140px">
        <option value="">⏰ كل المواعيد</option>
        <option value="8:00 - 9:00">⏰ 8:00 - 9:00</option>
        <option value="9:00 - 10:00">⏰ 9:00 - 10:00</option>
        <option value="10:00 - 11:00">⏰ 10:00 - 11:00</option>
        <option value="11:00 - 12:00">⏰ 11:00 - 12:00</option>
        <option value="12:00 - 1:00">⏰ 12:00 - 1:00</option>
        <option value="1:00 - 2:00">⏰ 1:00 - 2:00</option>
        <option value="2:00 - 3:00">⏰ 2:00 - 3:00</option>
        <option value="3:00 - 4:00">⏰ 3:00 - 4:00</option>
      </select>
      <button onclick="resetFilters()" id="filterResetBtn" style="background:rgba(138,133,128,0.15);color:#A8A39E;border:1px solid rgba(138,133,128,0.4);border-radius:6px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:none">✖️ مسح</button>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-num pending" id="statPending">-</div><div class="stat-lbl">منتظر</div></div>
      <div class="stat-card"><div class="stat-num done"    id="statDone">-</div><div class="stat-lbl">حضر ✅</div></div>
      <div class="stat-card"><div class="stat-num noshow"  id="statNoshow">-</div><div class="stat-lbl">غائب ❌</div></div>
    </div>
    <div id="bookingsList"></div>
    <button class="noshow-all-btn" id="noshowAllBtn" onclick="showNoshowAllDlg()" style="display:none">❌ تسجيل الغائبين تلقائياً</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <div class="d-icon"  id="dlgIcon"></div>
    <div class="d-title" id="dlgTitle"></div>
    <div class="d-msg"   id="dlgMsg"></div>
    <div class="d-btns">
      <button class="d-yes" id="dlgYes">تأكيد</button>
      <button class="d-no"  onclick="hideDialog()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const SB  = 'https://oqsowwtjutpjdypjpcum.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9xc293d3RqdXRwamR5cGpwY3VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MzI5ODAsImV4cCI6MjA5MTAwODk4MH0.Dp-WXuV-fHBsv35xiO7LnkTDevxKE5CC2iEVGNmwnqQ';
const HDR = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'};
const SLOTS=['8:00 - 9:00','9:00 - 10:00','10:00 - 11:00','11:00 - 12:00','12:00 - 1:00','1:00 - 2:00','2:00 - 3:00','3:00 - 4:00'];
// 📅 الـ date range الـ selected (default = اليوم إلى اليوم) + helpers
let selectedDateFrom = new Date(); selectedDateFrom.setHours(0,0,0,0);
let selectedDateTo   = new Date(); selectedDateTo.setHours(0,0,0,0);

// 📌 مهم: نستخدم local date methods (مش toISOString اللى بترجع UTC)
//    عشان مصر UTC+2/+3 يختلف عن UTC، اللى كان يسبب فرق يوم
function getDateStr(d){
  const y  = d.getFullYear();
  const m  = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}
function getTodayStr(){ return getDateStr(new Date()); }

function fmtArDate(d){
  return d.toLocaleDateString('ar-EG',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function updateDateUI(){
  const fromStr = getDateStr(selectedDateFrom);
  const toStr   = getDateStr(selectedDateTo);
  const todayStr = getTodayStr();
  document.getElementById('datePickerFrom').value = fromStr;
  document.getElementById('datePickerTo').value   = toStr;

  // لو نفس اليوم، نعرض تاريخ واحد. لو range، نعرض من...إلى
  if(fromStr === toStr){
    document.getElementById('dateLabel').textContent = fmtArDate(selectedDateFrom);
  } else {
    document.getElementById('dateLabel').textContent = `${fmtArDate(selectedDateFrom)}  ←  ${fmtArDate(selectedDateTo)}`;
  }

  // زر "اليوم" يظهر فقط لو الـ range مش يوم النهاردة بس
  const isOnlyToday = (fromStr === todayStr && toStr === todayStr);
  document.getElementById('todayBtn').style.display = isOnlyToday ? 'none' : 'inline-block';
}

function changeDate(){
  const vFrom = document.getElementById('datePickerFrom').value;
  const vTo   = document.getElementById('datePickerTo').value;
  if(!vFrom || !vTo) return;
  selectedDateFrom = new Date(vFrom + 'T00:00:00'); selectedDateFrom.setHours(0,0,0,0);
  selectedDateTo   = new Date(vTo   + 'T00:00:00'); selectedDateTo.setHours(0,0,0,0);
  updateDateUI();
  logActivity('emp_change_date','📅 غير فترة العرض '+vFrom+' → '+vTo,{from:vFrom,to:vTo});
  allBookings = [];
  if(emp) loadBookings();
}

function resetToToday(){
  selectedDateFrom = new Date(); selectedDateFrom.setHours(0,0,0,0);
  selectedDateTo   = new Date(); selectedDateTo.setHours(0,0,0,0);
  updateDateUI();
  allBookings = [];
  if(emp) loadBookings();
}

// 🔍 الفلاتر المحلية (نوع + ساعة) — بـ يـ apply على الـ data الموجودة بدون extra fetch
let filterVehicle = '';
let filterSlot    = '';

function getFilteredBookings(){
  return allBookings.filter(b => {
    if(filterVehicle && b.vehicle_type !== filterVehicle) return false;
    if(filterSlot && b.time_slot !== filterSlot) return false;
    return true;
  });
}

function applyFilters(){
  filterVehicle = document.getElementById('filterVehicle').value;
  filterSlot    = document.getElementById('filterSlot').value;
  // زر المسح يظهر لو فيه فلتر مفعّل
  const hasFilter = filterVehicle || filterSlot;
  document.getElementById('filterResetBtn').style.display = hasFilter ? 'inline-block' : 'none';

  renderBookings();
  updateStats();
  const filtered = getFilteredBookings();
  document.getElementById('noshowAllBtn').style.display =
    filtered.some(b => b.status === 'قيد الانتظار') ? 'block' : 'none';
}

function resetFilters(){
  document.getElementById('filterVehicle').value = '';
  document.getElementById('filterSlot').value    = '';
  applyFilters();
}

// 🚛 الـ vehicle types المتاحة لكل مخزن (يـ load مرة واحدة من DB)
let vehicleTypesByWarehouse = null;
const VEHICLE_ICONS = {
  'موتسيكل': '🏍️',
  'تروسكل':  '🛺',
  'كهرباء':  '⚡',
  'ZONTOS':  '🚗'
};

async function loadWarehouseVehicleTypes(){
  if(vehicleTypesByWarehouse) return; // cached
  try {
    const r = await fetch(
      `${SB}/rest/v1/warehouse_vehicle_types?select=display_order,warehouses(name),vehicle_types(name)&is_active=eq.true&order=display_order.asc`,
      { headers: HDR }
    );
    const data = await r.json();
    vehicleTypesByWarehouse = {};
    for(const row of (data || [])){
      const whName = row.warehouses && row.warehouses.name;
      const vtName = row.vehicle_types && row.vehicle_types.name;
      if(!whName || !vtName) continue;
      if(!vehicleTypesByWarehouse[whName]) vehicleTypesByWarehouse[whName] = [];
      if(!vehicleTypesByWarehouse[whName].includes(vtName)){
        vehicleTypesByWarehouse[whName].push(vtName);
      }
    }
  } catch(e){
    vehicleTypesByWarehouse = {}; // fallback — rebuildVehicleFilter بـ يستخدم default
  }
}

function rebuildVehicleFilter(){
  const sel = document.getElementById('filterVehicle');
  if(!sel) return;
  const currentValue = sel.value;

  let types = [];
  if(warehouse === 'ALL'){
    // Union: كل الأنواع المتاحة فى كل المخازن
    const set = new Set();
    if(vehicleTypesByWarehouse){
      Object.values(vehicleTypesByWarehouse).forEach(arr => arr.forEach(t => set.add(t)));
    }
    types = [...set];
  } else if(vehicleTypesByWarehouse && vehicleTypesByWarehouse[warehouse]){
    types = [...vehicleTypesByWarehouse[warehouse]];
  } else {
    // fallback: data لسه ما اتحملتش — اعرض الكل
    types = ['موتسيكل','تروسكل','كهرباء','ZONTOS'];
  }

  // ابنى الـ HTML
  let html = '<option value="">🚛 كل الأنواع</option>';
  for(const t of types){
    const icon = VEHICLE_ICONS[t] || '🚛';
    html += `<option value="${t}">${icon} ${t}</option>`;
  }
  sel.innerHTML = html;

  // استرجع الـ selection لو لسه available فى الـ list الجديدة
  if(currentValue && types.includes(currentValue)){
    sel.value = currentValue;
  } else if(currentValue){
    // الفلتر القديم مش متاح فى المخزن الجديد → reset
    filterVehicle = '';
    sel.value = '';
    if(allBookings.length) applyFilters();
  }
}

updateDateUI();

let emp=null,warehouse=null,allBookings=[];

// 📜 Activity Logging — تسجل كل حركة الموظف فى DB
//    fire-and-forget: لو فشل، الـ UI ميتعطلش
async function logActivity(action, label, details={}){
  if(!emp) return;
  try{
    fetch(`${SB}/rest/v1/activity_log`,{
      method:'POST',
      headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({
        user_type:'employee',
        user_id:emp.id,
        user_name:emp.name,
        user_extra:emp.role,
        action, action_label:label, details
      })
    });
  }catch(e){/* silent */}
}

async function doLogin(){
  const u=document.getElementById('empUser').value.trim();
  const p=document.getElementById('empPass').value.trim();
  if(!u||!p){showLoginErr('أدخل اسم المستخدم وكلمة المرور');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='جاري التحقق... <span class="spin"></span>';
  try{
    const r=await fetch(`${SB}/rest/v1/employees?username=eq.${encodeURIComponent(u)}&password=eq.${encodeURIComponent(p)}&is_active=eq.true&select=id,name,role`,{headers:HDR});
    const data=await r.json();
    if(data&&data.length>0){
      emp=data[0];
      sessionStorage.setItem('hawa_emp',JSON.stringify(emp));
      logActivity('emp_login','🚪 سجل دخول',{role:emp.role});
      enterMain();
    }else{
      // log failed login attempt
      fetch(`${SB}/rest/v1/activity_log`,{method:'POST',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify({
        user_type:'employee',user_id:null,user_name:u,action:'login_failed',action_label:'⚠️ محاولة دخول فاشلة',details:{username:u}
      })}).catch(()=>{});
      showLoginErr('اسم المستخدم أو كلمة المرور غلط');
    }
  }catch(e){showLoginErr('خطأ في الاتصال');}
  btn.disabled=false;btn.innerHTML='دخول';
}

function showLoginErr(msg){
  const el=document.getElementById('loginAlert');
  el.textContent='⚠️ '+msg;el.className='alert err';
}

function goReport(){
  logActivity('emp_view_report','📊 فتح صفحة التقرير');
  window.location.href = 'hawa_report.html';
}

function enterMain(){
  document.getElementById('loginView').classList.add('hide');
  document.getElementById('mainView').classList.add('show');
  document.getElementById('empNameDisplay').textContent=emp.name;
  document.getElementById('roleBadge').textContent=emp.role==='عام'?'👷 موظف عام':'👷 موظف '+emp.role;

  const tabsEl=document.getElementById('whTabs');
  if(emp.role==='عام'){
    // الموظف العام: 3 tabs (الكل، قليوب، السادات) — يقدر يـ filter لو حب
    tabsEl.style.display='';
    tabsEl.className='wh-tabs three';
    tabsEl.innerHTML=
      '<button class="wh-btn active" id="wh-ALL"     onclick="selectWarehouse(\'ALL\')">🌐 الكل</button>'+
      '<button class="wh-btn"        id="wh-قليوب"  onclick="selectWarehouse(\'قليوب\')">🏭 قليوب</button>'+
      '<button class="wh-btn"        id="wh-السادات" onclick="selectWarehouse(\'السادات\')">🏗️ السادات</button>';
    warehouse='ALL';
  }else{
    // موظف مخزن معين: tab واحد لمخزنه فقط (مايقدرش يشوف الباقى)
    tabsEl.style.display='';
    tabsEl.className='wh-tabs one';
    tabsEl.innerHTML='<button class="wh-btn active">'+(emp.role==='قليوب'?'🏭':'🏗️')+' '+emp.role+'</button>';
    warehouse=emp.role;
  }
  // 🚛 حمّل الـ vehicle types لكل مخزن + اعمل rebuild للـ filter (parallel مع loadBookings)
  loadWarehouseVehicleTypes().then(rebuildVehicleFilter);
  loadBookings();
  startRefreshIndicator();
}

function doLogout(){
  showDialog('🚪','تسجيل الخروج','هتخرج من الحساب؟',false,()=>{
    logActivity('emp_logout','🚪 خرج من النظام');
    sessionStorage.removeItem('hawa_emp');
    emp=null;warehouse=null;allBookings=[];
    document.getElementById('loginView').classList.remove('hide');
    document.getElementById('mainView').classList.remove('show');
    document.getElementById('empUser').value='';
    document.getElementById('empPass').value='';
    document.getElementById('loginAlert').className='alert';
  });
}

function selectWarehouse(wh){
  warehouse=wh;
  document.querySelectorAll('.wh-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('wh-'+wh);
  if(btn)btn.classList.add('active');
  // 🚛 update vehicle filter حسب المخزن الجديد
  rebuildVehicleFilter();
  const whLabel = wh === 'ALL' ? 'كل المخازن' : wh;
  logActivity('emp_view_warehouse','🏭 فتح '+whLabel,{warehouse:wh});
  loadBookings();
}

async function loadBookings(){
  const list=document.getElementById('bookingsList');
  if(!allBookings.length) list.innerHTML='<div class="loading-state">⏳ جاري التحميل...</div>';
  document.getElementById('noshowAllBtn').style.display='none';
  try{
    const fromStr = getDateStr(selectedDateFrom);
    const toStr   = getDateStr(selectedDateTo);

    // ⚠️ Validation: from > to
    if(fromStr > toStr){
      list.innerHTML='<div class="empty-state"><div class="ei">⚠️</div><p>تاريخ البداية أحدث من تاريخ النهاية</p></div>';
      allBookings = []; updateStats();
      return;
    }

    let url=`${SB}/rest/v1/bookings?select=*&loading_date=gte.${fromStr}&loading_date=lte.${toStr}&status=neq.${encodeURIComponent('ملغي')}&order=loading_date.asc,time_slot.asc,id.asc`;
    if(warehouse !== 'ALL'){
      url += `&warehouse=eq.${encodeURIComponent(warehouse)}`;
    }
    const r=await fetch(url,{headers:HDR});
    allBookings=await r.json();
    lastRefreshTime=Date.now();  // 📌 سجّل وقت آخر تحديث
    if(!allBookings.length){
      const whLabel = warehouse === 'ALL' ? 'المخزنين' : warehouse;
      const isOnlyToday = (fromStr === getTodayStr() && toStr === getTodayStr());
      const dayLabel = isOnlyToday
        ? 'اليوم'
        : (fromStr === toStr
            ? selectedDateFrom.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric',month:'long'})
            : `الفترة دى`);
      list.innerHTML='<div class="empty-state"><div class="ei">📭</div><p>مفيش حجوزات '+dayLabel+' في '+whLabel+'</p></div>';
      updateStats();return;
    }
    const ids=[...new Set(allBookings.map(b=>b.client_id).filter(Boolean))];
    if(ids.length){
      const cr=await fetch(`${SB}/rest/v1/clients?id=in.(${ids.join(',')})&select=id,name,company_code`,{headers:HDR});
      const clients=await cr.json();
      const map={};clients.forEach(c=>map[c.id]=c);
      allBookings.forEach(b=>b._client=map[b.client_id]||{});
    }
    renderBookings();updateStats();
    document.getElementById('noshowAllBtn').style.display=getFilteredBookings().some(b=>b.status==='قيد الانتظار')?'block':'none';
  }catch(e){list.innerHTML='<div class="loading-state">❌ خطأ في التحميل</div>';}
}

function renderBookings(){
  const list=document.getElementById('bookingsList');
  const isAllMode = warehouse === 'ALL';
  const filtered = getFilteredBookings();

  // empty state لو فيه فلتر مفعّل و 0 results
  if(allBookings.length && !filtered.length){
    const hasFilter = filterVehicle || filterSlot;
    const reasons = [];
    if(filterVehicle) reasons.push(`النوع: ${filterVehicle}`);
    if(filterSlot)    reasons.push(`الموعد: ${filterSlot}`);
    list.innerHTML = `<div class="empty-state"><div class="ei">🔍</div><p>مفيش حجوزات بالفلاتر دى</p>${reasons.length?`<p style="font-size:12px;color:var(--text-dim);margin-top:6px">${reasons.join(' | ')}</p>`:''}</div>`;
    return;
  }

  let html='';
  SLOTS.forEach(slot=>{
    const slotBks=filtered.filter(b=>b.time_slot===slot);
    if(!slotBks.length)return;
    html+=`<div class="slot-group"><div class="slot-header">⏰ ${slot}<span class="slot-count">${slotBks.length} حجز</span></div>`;
    slotBks.forEach(b=>{
      const isDone=b.status==='تم التنفيذ',isNoshow=b.status==='no-show';
      const name=b._client?.name||'عميل #'+b.client_id;
      const code=b._client?.company_code||'-';
      // فى ALL mode، اعرض badge للمخزن
      const whBadge = isAllMode
        ? `<span style="background:${b.warehouse==='قليوب'?'rgba(74,144,217,0.15)':'rgba(180,140,40,0.15)'};border:1px solid ${b.warehouse==='قليوب'?'rgba(74,144,217,0.5)':'rgba(180,140,40,0.5)'};color:${b.warehouse==='قليوب'?'#4A90D9':'#E0B040'};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-right:6px">${b.warehouse==='قليوب'?'🏭':'🏗️'} ${b.warehouse}</span>`
        : '';
      html+=`<div class="bk-card ${isDone?'done':isNoshow?'noshow':''}" id="card-${b.id}">
        <button class="check-btn ${isDone?'checked':isNoshow?'noshowed':''}"
          onclick="${isDone||isNoshow?'':`confirmDone(${b.id},'${name.replace(/'/g,"\'")}')`}"
          ${isDone||isNoshow?'disabled':''}>
          ${isDone?'✅':isNoshow?'❌':'○'}
        </button>
        <div class="bk-info">
          <div class="bk-name">${b.seq_number ? `<span style="background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);color:#E0B040;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-left:6px">#${b.seq_number}</span>` : ''}${b.permit_number ? `<span style="background:rgba(232,201,122,0.12);border:1px solid rgba(232,201,122,0.45);color:#E8C97A;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;margin-left:6px;letter-spacing:0.3px">🎫 ${b.permit_number}</span>` : ''}${whBadge}${name}</div>
          <div class="bk-meta">كود: <span>${code}</span></div>
          <div class="bk-sub">🚗 ${b.vehicle_type} — ${b.count} عربية</div>
        </div>
        <div class="bk-status ${isDone?'done':isNoshow?'noshow':'pending'}">
          ${isDone?'حضر ✅':isNoshow?'غائب ❌':'منتظر'}
        </div>
      </div>`;
    });
    html+='</div>';
  });
  list.innerHTML=html;
}

function updateStats(){
  const filtered = getFilteredBookings();
  document.getElementById('statPending').textContent=filtered.filter(b=>b.status==='قيد الانتظار').length;
  document.getElementById('statDone').textContent=filtered.filter(b=>b.status==='تم التنفيذ').length;
  document.getElementById('statNoshow').textContent=filtered.filter(b=>b.status==='no-show').length;
}

function confirmDone(id,name){
  showDialog('✅','تأكيد الحضور',`هتسجل حضور "${name}"؟`,false,async()=>{await markStatus(id,'تم التنفيذ');});
}

async function markStatus(id,status){
  try{
    const res=await fetch(`${SB}/rest/v1/bookings?id=eq.${id}`,{method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},body:JSON.stringify({status})});
    if(res.ok){
      const b=allBookings.find(x=>x.id===id);
      if(b){b.status=status;}
      if(status==='no-show'&&b?.client_id)await incrementNoshow(b.client_id);
      // 📜 سجّل الحركة
      if(b){
        const clientName = b._client?.name || 'عميل #'+b.client_id;
        if(status==='تم التنفيذ'){
          logActivity('emp_checkin','✅ سجل حضور: '+clientName,{booking_id:id,seq_number:b.seq_number,client_name:clientName,warehouse:b.warehouse,time_slot:b.time_slot});
        }else if(status==='no-show'){
          logActivity('emp_noshow','❌ سجل غياب: '+clientName,{booking_id:id,seq_number:b.seq_number,client_name:clientName,warehouse:b.warehouse,time_slot:b.time_slot});
        }
      }
      renderBookings();updateStats();
      document.getElementById('noshowAllBtn').style.display=getFilteredBookings().some(b=>b.status==='قيد الانتظار')?'block':'none';
    }
  }catch(e){}
}

async function incrementNoshow(clientId){
  try{
    const r=await fetch(`${SB}/rest/v1/clients?id=eq.${clientId}&select=no_show_count`,{headers:HDR});
    const d=await r.json();
    const newCount=(d[0]?.no_show_count||0)+1;
    await fetch(`${SB}/rest/v1/clients?id=eq.${clientId}`,{
      method:'PATCH',headers:{...HDR,'Prefer':'return=minimal'},
      body:JSON.stringify({no_show_count:newCount,is_blocked:newCount>=2})
    });
  }catch(e){}
}

function showNoshowAllDlg(){
  const pending=getFilteredBookings().filter(b=>b.status==='قيد الانتظار');
  const hasFilter = filterVehicle || filterSlot;
  const filterNote = hasFilter ? '\n(الفلاتر الحالية فقط)' : '';
  showDialog('❌','تسجيل الغائبين',`هتسجل ${pending.length} عميل كغائبين؟${filterNote}\nمش هتقدر ترجع!`,true,async()=>{
    logActivity('emp_noshow_bulk','❌ سجل غائبين تلقائياً ('+pending.length+' عميل)',{count:pending.length,date_from:getDateStr(selectedDateFrom),date_to:getDateStr(selectedDateTo),warehouse,filter_vehicle:filterVehicle||null,filter_slot:filterSlot||null});
    for(const b of pending)await markStatus(b.id,'no-show');
  });
}

function showDialog(icon,title,msg,danger,onYes){
  document.getElementById('dlgIcon').textContent=icon;
  document.getElementById('dlgTitle').textContent=title;
  document.getElementById('dlgMsg').textContent=msg;
  const y=document.getElementById('dlgYes');
  y.className=danger?'d-yes danger':'d-yes';
  y.onclick=async()=>{hideDialog();await onYes();};
  document.getElementById('overlay').classList.add('show');
}
function hideDialog(){document.getElementById('overlay').classList.remove('show');}

// 📌 متغيرات الـ auto-refresh + indicator
let lastRefreshTime=Date.now();
let refreshIndicatorTimer=null;

function startRefreshIndicator(){
  if(refreshIndicatorTimer)clearInterval(refreshIndicatorTimer);
  const el=document.getElementById('refreshIndicator');
  if(!el)return;
  refreshIndicatorTimer=setInterval(()=>{
    if(!emp){clearInterval(refreshIndicatorTimer);return;}
    const sec=Math.floor((Date.now()-lastRefreshTime)/1000);
    let txt;
    if(sec<5)      txt='✨ تم التحديث';
    else if(sec<60)  txt='🕐 آخر تحديث: '+sec+' ثانية';
    else             txt='🕐 آخر تحديث: '+Math.floor(sec/60)+' دقيقة';
    el.textContent=txt;
  },1000);
}

const saved=sessionStorage.getItem('hawa_emp');
if(saved){emp=JSON.parse(saved);enterMain();}
// ⏰ Auto-refresh كل دقيقتين (120 ثانية)
setInterval(()=>{if(emp)loadBookings();},120000);
</script>
